name: Build rubens DS Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
    steps:
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq flex bison bc libelf-dev libssl-dev lz4 xz-utils cpio git curl

      - name: Clone rubens kernel (MI official)
        run: git clone --depth 1 --single-branch --branch rubens-s-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel-5.10

      - name: Clone MTK vendor modules (MI official)
        run: git clone --depth 1 --single-branch --branch rubens-s-oss https://github.com/MiCode/MTK_kernel_modules.git kernel-5.10/vendor/mediatek/kernel_modules

      - name: Apply DroidSpaces ABI patches
        working-directory: kernel-5.10
        run: |
          if ! grep -q "ANDROID_KABI_USE(6, struct sysv_sem" include/linux/sched.h 2>/dev/null; then
            echo "Applying SYSVIPC ABI patch..."
            patch -p1 << 'P1'
--- a/include/linux/sched.h
+++ b/include/linux/sched.h
@@ -973,8 +973,8 @@ struct task_struct {
 	struct nameidata		*nameidata;

 #ifdef CONFIG_SYSVIPC
-	struct sysv_sem			sysvsem;
-	struct sysv_shm			sysvshm;
+	// struct sysv_sem			sysvsem;
+	// struct sysv_shm			sysvshm;
 #endif
 #ifdef CONFIG_DETECT_HUNG_TASK
 	unsigned long			last_switch_count;
@@ -1384,9 +1384,15 @@ struct task_struct {
 	ANDROID_KABI_RESERVE(3);
 	ANDROID_KABI_RESERVE(4);
 	ANDROID_KABI_RESERVE(5);
+
+#ifdef CONFIG_SYSVIPC
+	ANDROID_KABI_USE(6, struct sysv_sem sysvsem);
+	_ANDROID_KABI_REPLACE(ANDROID_KABI_RESERVE(7); ANDROID_KABI_RESERVE(8), struct sysv_shm sysvshm);
+#else
 	ANDROID_KABI_RESERVE(6);
 	ANDROID_KABI_RESERVE(7);
 	ANDROID_KABI_RESERVE(8);
+#endif

 	/*
 	 * New fields for task_struct should be added above here, so that
P1
          else
            echo "SYSVIPC patch already applied"
          fi

          if ! grep -q "ANDROID_KABI_USE(1, unsigned long mq_bytes)" include/linux/sched/user.h 2>/dev/null; then
            echo "Applying POSIX_MQUEUE ABI patch..."
            patch -p1 << 'P2'
--- a/include/linux/sched/user.h
+++ b/include/linux/sched/user.h
@@ -23,7 +23,7 @@ struct user_struct {
 #endif
 #ifdef CONFIG_POSIX_MQUEUE
 	/* protected by mq_lock	*/
-	unsigned long mq_bytes;	/* How many bytes can be allocated to mqueue? */
+	//unsigned long mq_bytes;	/* How many bytes can be allocated to mqueue? */
 #endif
 	unsigned long locked_shm; /* How many pages of mlocked shm ? */
 	unsigned long unix_inflight;	/* How many files in flight in unix sockets */
@@ -44,9 +44,15 @@ struct user_struct {
 	/* Miscellaneous per-user rate limit */
 	struct ratelimit_state ratelimit;

+#if defined(CONFIG_POSIX_MQUEUE)
+	ANDROID_KABI_USE(1, unsigned long mq_bytes);
+	ANDROID_KABI_RESERVE(2);
+	ANDROID_OEM_DATA_ARRAY(1, 2);
+#else
 	ANDROID_KABI_RESERVE(1);
 	ANDROID_KABI_RESERVE(2);
 	ANDROID_OEM_DATA_ARRAY(1, 2);
+#endif
 };
 extern int uids_sysfs_init(void);
P2
          else
            echo "POSIX_MQUEUE patch already applied"
          fi

      - name: Add DroidSpaces configs
        working-directory: kernel-5.10
        run: |
          if ! grep -q "CONFIG_SYSVIPC=y" arch/arm64/configs/mikrn_rubens_defconfig 2>/dev/null; then
            cat >> arch/arm64/configs/mikrn_rubens_defconfig << 'EOCFG'
# DroidSpaces container support
CONFIG_SYSVIPC=y
CONFIG_POSIX_MQUEUE=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y
CONFIG_USER_NS=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_PIDS=y
CONFIG_TMPFS_XATTR=y
EOCFG
            echo "Configs added"
          else
            echo "Configs already present"
          fi

      - name: Setup toolchain + Build
        working-directory: kernel-5.10
        run: |
          # --- Toolchain ---
          # Try Google's prebuilt, fallback to system clang
          mkdir -p prebuilts-master/clang/host/linux-x86
          cd prebuilts-master/clang/host/linux-x86

          CLANG_OK=0
          wget --timeout=30 -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b.tar.gz" -O clang.tar.gz 2>/dev/null && \
            mkdir -p clang-r416183b && tar xf clang.tar.gz -C clang-r416183b/ 2>/dev/null && \
            file clang-r416183b/bin/clang 2>/dev/null | grep -q ELF && CLANG_OK=1

          if [ "$CLANG_OK" = "1" ]; then
            export CLANG_DIR="$PWD/clang-r416183b/bin"
            echo "Using Google clang-r416183b"
          else
            sudo apt-get install -y -qq clang-14 lld-14 llvm-14 || sudo apt-get install -y -qq clang lld
            export CLANG_DIR="/usr/bin"
            echo "Using system clang + lld"
          fi

          cd "$GITHUB_WORKSPACE/kernel-5.10"
          export PATH="$CLANG_DIR:$PATH"

          # --- Merge defconfigs ---
          mkdir -p out
          ARCH=arm64 scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/mikrn_rubens_defconfig

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig 2>&1 | tail -5

          echo ""
          echo "=== Checking DroidSpaces configs ==="
          grep -E "CONFIG_(SYSVIPC|POSIX_MQUEUE|PID_NS|IPC_NS|USER_NS|DEVTMPFS|CGROUP_DEVICE|CGROUP_PIDS|TMPFS_XATTR)" out/.config

          echo ""
          echo "=== Building Image + modules ==="
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 Image modules -j$(nproc) 2>&1 | tail -30
          echo "BUILD_EXIT_CODE=$?"

          echo ""
          echo "=== Output ==="
          ls -lh out/arch/arm64/boot/Image

      - name: Package AnyKernel3
        run: |
          mkdir -p ak3/modules
          gzip -9 -c kernel-5.10/out/arch/arm64/boot/Image > ak3/Image.gz
          find kernel-5.10/out -name "*.ko" -exec cp {} ak3/modules/ \; 2>/dev/null
          echo "Module count: $(ls ak3/modules/*.ko 2>/dev/null | wc -l)"

          cat > ak3/anykernel.sh << 'EOF'
# DroidSpaces kernel for Redmi K50 (rubens)
device.name1=rubens
device.name2=rubens
block=/dev/block/by-name/boot
is_slot_device=1
ramdisk_compression=auto
do.modules=1
do.ramdisk=1
do.ramdisk.repack=1
kernel.string=Image.gz
EOF

          cd ak3 && zip -r9 ../rubens-droidspaces-kernel-$(date +%Y%m%d).zip .
          ls -lh ../rubens-droidspaces-kernel-*.zip
          echo "ZIP_NAME=$(basename ../rubens-droidspaces-kernel-*.zip)" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rubens-ds-kernel
          path: rubens-droidspaces-kernel-*.zip
